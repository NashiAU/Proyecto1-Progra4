<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Oferente - Dashboard</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/Oferente/dashboard}">Dashboard</a>
            <a th:href="@{/Oferente/habilidades}">Mis habilidades</a>
            <a th:href="@{/Oferente/mi_cv}">Mi CV</a>
        </div>
    </div>
    <div class="nav-right">
        <span th:text="${#authentication.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-logout">Salir</button>
        </form>
    </div>
</header>

<main>
    <div class="container">
        <div class="title">Oferente - Dashboard</div>
        <div class="subtitle">Administrá tus habilidades y tu CV.</div>
        <a th:href="@{/Oferente/habilidades}" class="btn">Mis habilidades</a>
        <a th:href="@{/Oferente/mi_cv}" class="btn">Mi CV</a>
    </div>
</main>

<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
