<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle Candidato</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/Empresa/dashboard}">Dashboard</a>
            <a th:href="@{/Empresa/puestos}">Mis puestos</a>
            <a th:href="@{/Empresa/publicar}">Publicar puesto</a>
        </div>
    </div>
    <div class="nav-right">
        <span th:text="${#authentication.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-logout">Salir</button>
        </form>
    </div>
</header>
<main>
    <div class="container">
        <div class="title">Detalle de oferente</div>

        <p><strong th:text="${oferente.nombre + ' ' + oferente.primerApellido}"></strong></p>
        <p>Identificación: <span th:text="${oferente.identificacion}"></span></p>
        <p>Email: <span th:text="${oferente.usuario.username}"></span></p>
        <p>Teléfono: <span th:text="${oferente.telefono}"></span></p>
        <p>Residencia: <span th:text="${oferente.lugarResidencia}"></span></p>

        <h3>Habilidades</h3>
        <table>
            <tr>
                <th>Característica</th>
                <th>Nivel</th>
            </tr>
            <tr th:each="h : ${habilidades}">
                <td th:text="${h.caracteristica.nombre}"></td>
                <td th:text="${h.nivel}"></td>
            </tr>
        </table>

        <br>
        <div th:if="${tieneCv}">
            <a th:href="@{/Empresa/candidatos/cv/{id}(id=${oferente.id})}" class="btn">Ver CV</a>
            <a th:href="@{/Empresa/candidatos/cv/{id}(id=${oferente.id},download=1)}" class="btn">Descargar CV</a>
        </div>

        <div th:if="${!tieneCv}">
            <p><b>Este candidato no ha subido su currículum.</b></p>
        </div>

        <br>
        <a th:href="@{/Empresa/puestos}" id="volver">Volver</a>
    </div>
</main>
<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
