<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Características</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/Administrador/dashboard}">Dashboard</a>
            <a th:href="@{/Administrador/empresas}">Empresas pendientes</a>
            <a th:href="@{/Administrador/oferentes}">Oferentes pendientes</a>
            <a th:href="@{/Administrador/caracteristicas}">Características</a>
            <a th:href="@{/Administrador/reportes}">Reportes</a>
        </div>
    </div>
    <div class="nav-right">
        <span th:text="${#authentication.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-logout">Salir</button>
        </form>
    </div>
</header>

<main>
    <div class="container">
        <div class="title">Características</div>
        <div class="contenedor">

            <!-- COLUMNA 1: árbol de características -->
            <div class="habilidades">
                <h3>Categorías registradas</h3>
                <ul th:each="raiz : ${raices}">
                    <li th:text="${raiz.nombre}"></li>
                </ul>
            </div>

            <!-- COLUMNA 2: formulario agregar -->
            <div class="ingresar">
                <h3>Agregar característica</h3>
                <form method="post" th:action="@{/Administrador/caracteristicas/crear}">
                    <label>Nombre:</label>
                    <input type="text" name="nombre" required>

                    <label>Padre (opcional):</label>
                    <select name="idPadre" style="width:100%; padding:6px; margin-bottom:10px;">
                        <option value="">-- Sin padre (raíz) --</option>
                        <option th:each="c : ${todas}"
                                th:value="${c.id}"
                                th:text="${c.nombre}"></option>
                    </select>

                    <button type="submit" class="btn">Crear</button>
                </form>
            </div>

        </div>
    </div>
</main>

<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
