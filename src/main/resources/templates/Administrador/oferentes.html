<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Oferentes Pendientes</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/Administrador/dashboard}">Dashboard</a>
            <a th:href="@{/Administrador/empresas}">Empresas pendientes</a>
            <a th:href="@{/Administrador/oferentes}">Oferentes pendientes</a>
            <a th:href="@{/Administrador/caracteristicas}">Características</a>
            <a th:href="@{/Administrador/reportes}">Reportes</a>
        </div>
    </div>
    <div class="nav-right">
        <span th:text="${#authentication.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-logout">Salir</button>
        </form>
    </div>
</header>

<main>
    <div class="container">
        <div class="title">Oferentes pendientes</div>

        <div th:if="${oferentes.isEmpty()}">
            <p>No hay oferentes pendientes de aprobación.</p>
        </div>

        <table th:if="${!oferentes.isEmpty()}">
            <tr>
                <th>Correo</th>
                <th>Nombre</th>
                <th>Identificación</th>
                <th>Teléfono</th>
                <th>Acción</th>
            </tr>
            <tr th:each="o : ${oferentes}">
                <td th:text="${o.usuario.username}"></td>
                <td th:text="${o.nombre + ' ' + o.primerApellido}"></td>
                <td th:text="${o.identificacion}"></td>
                <td th:text="${o.telefono}"></td>
                <td>
                    <form th:action="@{/Administrador/oferentes/aprobar/{id}(id=${o.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn">Aprobar</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</main>

<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
