<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Empresas Pendientes</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/Administrador/dashboard}">Dashboard</a>
            <a th:href="@{/Administrador/empresas}">Empresas pendientes</a>
            <a th:href="@{/Administrador/oferentes}">Oferentes pendientes</a>
            <a th:href="@{/Administrador/caracteristicas}">Características</a>
            <a th:href="@{/Administrador/reportes}">Reportes</a>
        </div>
    </div>
    <div class="nav-right">
        <span th:text="${#authentication.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-logout">Salir</button>
        </form>
    </div>
</header>

<main>
    <div class="container">
        <div class="title">Empresas pendientes</div>

        <div th:if="${empresas.isEmpty()}">
            <p>No hay empresas pendientes de aprobación.</p>
        </div>

        <table th:if="${!empresas.isEmpty()}">
            <tr>
                <th>Correo</th>
                <th>Nombre</th>
                <th>Localización</th>
                <th>Teléfono</th>
                <th>Acción</th>
            </tr>
            <tr th:each="e : ${empresas}">
                <td th:text="${e.usuario.username}"></td>
                <td th:text="${e.nombre}"></td>
                <td th:text="${e.localizacion}"></td>
                <td th:text="${e.telefono}"></td>
                <td>
                    <form th:action="@{/Administrador/empresas/aprobar/{id}(id=${e.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn">Aprobar</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</main>

<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
