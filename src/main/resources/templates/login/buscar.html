<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Buscar Puestos</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/home}">Inicio</a>
            <a th:href="@{/puestos/buscar}">Buscar puestos</a>
            <a th:href="@{/registro/empresa}">Registro Empresa</a>
            <a th:href="@{/registro/oferente}">Registro Oferente</a>
        </div>
    </div>
    <div class="nav-right">
        <a th:href="@{/login}">Login</a>
    </div>
</header>

<main>
    <div class="container">
        <div class="title">Buscar puestos por características</div>

        <form method="get" th:action="@{/puestos/buscar}">
            <label>Seleccioná características:</label><br><br>

            <div th:each="c : ${todas}">
                <label>
                    <input type="checkbox"
                           name="caracteristicaIds"
                           th:value="${c.id}"
                           th:text="${c.nombre}">
                </label><br>
            </div>

            <br>
            <button type="submit" class="btn">Buscar</button>
            <a th:href="@{/puestos/buscar}" class="btn">Limpiar</a>
        </form>

        <br>

        <div th:if="${buscado}">
            <h3>Resultados</h3>

            <div th:if="${resultados.isEmpty()}">
                <p>No se encontraron puestos con esas características.</p>
            </div>

            <div th:each="p : ${resultados}" class="puestos">
                <h3 th:text="${p.empresa.nombre}"></h3>
                <p th:text="${p.descripcionGeneral}"></p>
                <p>Salario: &#8364; <span th:text="${p.salarioOfrecido}"></span></p>
                <a th:href="@{/puestos/detalle/{id}(id=${p.id})}" class="btn">Ver detalle</a>
            </div>
        </div>

    </div>
</main>

<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
