<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle Puesto</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/home}">Inicio</a>
            <a th:href="@{/puestos/buscar}">Buscar puestos</a>
            <a th:href="@{/registro/empresa}">Registro Empresa</a>
            <a th:href="@{/registro/oferente}">Registro Oferente</a>
        </div>
    </div>
    <div class="nav-right">
        <a th:href="@{/login}">Login</a>
    </div>
</header>

<main>
    <div class="container">
        <div class="title" th:text="${puesto.empresa.nombre}"></div>
        <div class="subtitle" th:text="${puesto.descripcionGeneral}"></div>

        <p>Salario: &#8364; <span th:text="${puesto.salarioOfrecido}"></span></p>
        <p>Tipo: <span th:text="${puesto.tipoPublicacion}"></span></p>

        <h3>Características requeridas</h3>
        <div th:if="${requisitos.isEmpty()}">
            <p>No se especificaron características.</p>
        </div>
        <table th:if="${!requisitos.isEmpty()}">
            <tr>
                <th>Característica</th>
                <th>Nivel mínimo</th>
            </tr>
            <tr th:each="r : ${requisitos}">
                <td th:text="${r.caracteristica.nombre}"></td>
                <td th:text="${r.nivelDeseado}"></td>
            </tr>
        </table>

        <br>
        <a th:href="@{/puestos/buscar}" id="volver">Volver</a>
    </div>
</main>

<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
