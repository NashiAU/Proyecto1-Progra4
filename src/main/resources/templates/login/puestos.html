<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bolsa de Empleo</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/Styles/styles.css}">
</head>
<body>
<header>
    <div class="nav-left">
        <div class="logo">BolsaEmpleo</div>
        <div class="nav-links">
            <a th:href="@{/puestos/buscar}">Buscar puestos</a>
            <a th:href="@{/registro/empresa}">Registro Empresa</a>
            <a th:href="@{/registro/oferente}">Registro Oferente</a>
        </div>
    </div>
    <div class="nav-right">
        <a th:href="@{/login}">Login</a>
    </div>
</header>

<main>
    <div class="container">
        <div class="title">Bolsa de Empleo</div>
        <div class="subtitle">Últimos 5 puestos públicos</div>

        <div class="puestos-grid">
            <div th:each="puesto : ${puestos}" class="puesto-card">
                <h3 th:text="${puesto.empresa.nombre}"></h3>
                <p th:text="${puesto.descripcionGeneral}"></p>
                <p>&#8364; <span th:text="${puesto.salarioOfrecido}"></span></p>
                <a th:href="@{/puestos/detalle/{id}(id=${puesto.id})}" class="btn">Ver detalle</a>

                <!-- Tooltip con características — visible solo en hover via CSS -->
                <div class="puesto-tooltip">
                    <strong>Características requeridas:</strong><br>
                    <span th:if="${requisitos[puesto.id].isEmpty()}">
                        Sin características especificadas
                    </span>
                    <ul style="margin:5px 0; padding-left:16px;">
                        <li th:each="r : ${requisitos[puesto.id]}"
                            th:text="${r.caracteristica.nombre + ' (nivel ' + r.nivelDeseado + ')'}">
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <div><b>Bolsa de Empleo</b><br>Total Soft Inc.</div>
    <div>Contacto: info@bolsaempleo.local</div>
</footer>
</body>
</html>
